<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Site — Directory</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; max-width: 680px;
           margin: 60px auto; padding: 0 20px; line-height: 1.6; color: #1a1a1a; }
    h1 { margin-bottom: 0.1em; }
    .muted { color: #777; margin-top: 0; }
    .dir { list-style: none; padding: 0; margin: 0; }
    .dir li { margin: 0; }
    .dir a { display: block; padding: 12px 16px; border: 1px solid #e3e3e3;
             border-radius: 10px; margin-bottom: 10px; text-decoration: none;
             color: #0066cc; font-weight: 600; transition: all .12s ease; }
    .dir a:hover { border-color: #0066cc; background: #f5faff; }
    .folder { margin: 26px 0 12px; padding-bottom: 6px; border-bottom: 2px solid #eee;
              font-size: 0.78em; letter-spacing: .06em; text-transform: uppercase;
              color: #888; font-weight: 700; }
    .folder::before { content: "📁 "; }
    .subtree { padding-left: 18px; border-left: 2px solid #f0f0f0; margin-bottom: 8px; }
    #directory > .folder:first-child { margin-top: 28px; }
    .empty, .error { color: #777; margin-top: 28px; }
  </style>
</head>
<body>
  <h1>My Site</h1>
  <p class="muted">A directory of every page published here.</p>

  <div id="directory"></div>
  <p class="empty" id="empty" hidden>No pages yet — drop an <code>.html</code> file in your folder and publish.</p>
  <p class="error" id="error" hidden>Couldn't load the page list right now. Try refreshing in a moment.</p>

  <script>
    // Build a nested directory by asking GitHub which files live in this repo.
    const REPO = "fredpurches-sys/fredpurches-sys.github.io";
    const API  = `https://api.github.com/repos/${REPO}/git/trees/main?recursive=1`;

    // "my-cool-page" -> "My Cool Page"
    function prettify(name) {
      return name.replace(/\.html$/i, "")
                 .replace(/[-_]+/g, " ")
                 .replace(/\b\w/g, c => c.toUpperCase());
    }

    // Insert a file path into a nested tree object: {files: [...], dirs: {name: subtree}}
    function addToTree(root, path) {
      const parts = path.split("/");
      const file = parts.pop();
      let node = root;
      for (const dir of parts) {
        node.dirs[dir] = node.dirs[dir] || { files: [], dirs: {} };
        node = node.dirs[dir];
      }
      node.files.push({ name: file, path });
    }

    // Render a tree node into a container element.
    function renderTree(node, container) {
      const ul = document.createElement("ul");
      ul.className = "dir";
      for (const f of node.files.sort((a, b) => a.name.localeCompare(b.name))) {
        const li = document.createElement("li");
        const a  = document.createElement("a");
        a.href = "/" + f.path;
        a.textContent = prettify(f.name);
        li.appendChild(a);
        ul.appendChild(li);
      }
      container.appendChild(ul);

      for (const dirName of Object.keys(node.dirs).sort()) {
        const h = document.createElement("div");
        h.className = "folder";
        h.textContent = prettify(dirName);
        container.appendChild(h);
        const sub = document.createElement("div");
        sub.className = "subtree";
        renderTree(node.dirs[dirName], sub);
        container.appendChild(sub);
      }
    }

    fetch(API)
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(data => {
        const pages = (data.tree || [])
          .filter(f => f.type === "blob" && /\.html$/i.test(f.path))
          .map(f => f.path)
          .filter(p => {
            const base = p.split("/").pop().toLowerCase();
            return base !== "index.html" && base !== "404.html";
          });

        if (pages.length === 0) {
          document.getElementById("empty").hidden = false;
          return;
        }
        const root = { files: [], dirs: {} };
        pages.forEach(p => addToTree(root, p));
        renderTree(root, document.getElementById("directory"));
      })
      .catch(() => { document.getElementById("error").hidden = false; });
  </script>
</body>
</html>
